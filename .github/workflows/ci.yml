name: Registry validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test validator
        run: python3 -m unittest discover -s tests

      - name: Validate live registry
        run: python3 .github/scripts/validate_registry.py tool-registry.json --check-urls

      - name: Validate example registry
        run: python3 .github/scripts/validate_registry.py examples/tool-registry.example.json
